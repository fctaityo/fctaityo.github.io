<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ddd;
  font-family:sans-serif;
  overflow:hidden;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
  cursor:pointer;
}

.logo a{
  color:inherit;
  text-decoration:none;
}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
  overflow:hidden;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  height:calc(100vh - 60px);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
}

h2{
  font-size:18px;
  margin:0 0 10px 0;
}

button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:inherit;
  border:1px solid #444;
  cursor:pointer;
}

pre{
  white-space:pre-wrap;
}

textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:inherit;
  border:1px solid #333;
  padding:10px;
  box-sizing:border-box;
  resize:none;
}

/* AI / VR スクロール安定化 */
#aiOut, #vrOut{
  flex:1;
  overflow:auto;
  white-space:pre-wrap;
  padding-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <a href="index.html">FCTAITYO CITY</a>
  </div>
</div>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / INPUT</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>

<textarea id="rpgMemo"></textarea>

<button onclick="process()">TRANSLATE</button>
</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI / TRANSFORM</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel">
<h2>🟩 VR / HISTORY</h2>
<pre id="vrOut"></pre>
</div>

</div>

<script>

const VR_KEY = "vr_history";

/* =========================
   GEMINI TRANSLATE（安定版）
========================= */
async function translate(text){

  try{

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY",
      {
        method: "POST",
        headers: {
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          contents:[{
            parts:[{
              text:`Translate to English:\n${text}`
            }]
          }]
        })
      }
    );

    const data = await res.json();

    console.log("Gemini response:", data);

    // ❗APIエラー明示化
    if(data.error){
      return {
        input:text,
        output:`[API ERROR] ${data.error.message}`
      };
    }

    // ❗安全取得
    const output =
      data?.candidates?.[0]?.content?.parts?.[0]?.text;

    return {
      input:text,
      output: output || "[NO RESPONSE]"
    };

  }catch(e){

    return {
      input:text,
      output:`[NETWORK ERROR] ${e.message}`
    };
  }
}

/* =========================
   PROCESS
========================= */
async function process(){

  const text = document.getElementById("rpgMemo").value;

  if(!text.trim()){
    pushVRLog("EMPTY INPUT");
    return;
  }

  const result = await translate(text);

  document.getElementById("aiOut").innerText =
`TRANSLATION
----------------
${result.input}
↓
${result.output}`;

  pushVRLog(`TRANSLATE: ${result.input} → ${result.output}`);
}

/* =========================
   CITY
========================= */
function setCity(type){

  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  pushVRLog(`CITY: ${type}`);
}

/* =========================
   VR LOG
========================= */
function pushVRLog(text){

  const now = new Date();
  const date = now.toLocaleDateString('ja-JP');
  const time = now.toLocaleTimeString();

  const entry = `[${date} ${time}] ${text}`;

  let logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");
  logs.push(entry);

  localStorage.setItem(VR_KEY, JSON.stringify(logs));

  renderVR();
}

/* =========================
   VR RENDER
========================= */
function renderVR(){

  const vr = document.getElementById("vrOut");
  const logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  vr.innerText = logs.join("\n");

  vr.scrollTop = vr.scrollHeight;
}

/* INIT */
renderVR();

</script>

</body>
</html>
