<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
  cursor:pointer;
  white-space:nowrap;
}

/* ===== MODE ===== */
.mode-indicator{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:13px;
  padding:6px 14px;
  border:1px solid #333;
  background:#0f0f0f;
  color:#aaa;
}

body.mode-rpg .mode-indicator{ color:#ffb8a8; border-color:#7a3b2b; }
body.mode-ai .mode-indicator{ color:#8ec5ff; border-color:#2b4d7a; }
body.mode-vr .mode-indicator{ color:#8fffd0; border-color:#1f6b4d; }

/* ===== NAV ===== */
.nav{
  display:flex;
  gap:10px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-size:13px;
  padding:6px 10px;
  border:1px solid #333;
}

/* ===== LAYOUT ===== */
.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  overflow:auto;
}

button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:#fff;
  border:1px solid #444;
  cursor:pointer;
}

pre{
  white-space:pre-wrap;
  color:#aaa;
}

/* ===== MEMO UI ===== */
textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:10px;
}

</style>
</head>

<body>

<div class="topbar">

  <div class="logo" onclick="location.href='index.html'">
    FCTAITYO CITY
  </div>

  <div class="mode-indicator" id="modeIndicator">MODE</div>

  <div class="nav">
    <a href="city.html?mode=rpg">RPG</a>
    <a href="city.html?mode=ai">AI</a>
    <a href="city.html?mode=vr">VR</a>
  </div>

</div>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / DESIGN</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>

<!-- ★メモ機能 -->
<textarea id="rpgMemo" placeholder="RPGメモを書く"></textarea>
<button onclick="saveMemo()">SAVE</button>
<button onclick="loadMemo()">LOAD</button>

</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI NODE</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel">
<h2>🟩 VR NODE</h2>
<pre id="vrOut"></pre>
</div>

</div>

<script>

const params = new URLSearchParams(location.search);
const mode = params.get("mode") || "rpg";
const cityType = params.get("city") || "cyber";

document.body.classList.add("mode-" + mode);
document.getElementById("modeIndicator").innerText = mode.toUpperCase() + " MODE";

function setCity(type){

  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  document.getElementById("aiOut").innerText =
`AI OUTPUT:
${type} processed`;

  document.getElementById("vrOut").innerText =
`VR LOG:
tracking ${type}`;
}

/* ===== MEMO ===== */
function saveMemo(){
  localStorage.setItem("rpgMemo",
    document.getElementById("rpgMemo").value
  );
}

function loadMemo(){
  document.getElementById("rpgMemo").value =
    localStorage.getItem("rpgMemo") || "";
}

loadMemo();

setCity(cityType);

</script>

</body>
</html>
