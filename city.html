<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ddd;
  font-family:sans-serif;
  overflow:hidden;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo a{
  color:inherit;
  text-decoration:none;
  font-weight:bold;
  letter-spacing:2px;
}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
  overflow:hidden;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  height:calc(100vh - 60px);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
}

h2{
  font-size:18px;
  margin:0 0 10px 0;
}

button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:inherit;
  border:1px solid #444;
  cursor:pointer;
}

textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:inherit;
  border:1px solid #333;
  padding:10px;
  box-sizing:border-box;
  resize:none;
}

#aiOut, #vrOut{
  flex:1;
  overflow:auto;
  white-space:pre-wrap;
  padding-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <a href="index.html">FCTAITYO CITY</a>
  </div>
</div>

<div class="wrap">

<!-- INPUT -->
<div class="panel">
<h2>🟥 RPG / INPUT</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<div id="rpgOut"></div>

<textarea id="rpgMemo" placeholder="ここに入力してAIと会話"></textarea>

<button onclick="chat()">SEND</button>
</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI / TRANSFORM</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR LOG -->
<div class="panel">
<h2>🟩 VR / HISTORY</h2>
<pre id="vrOut"></pre>
</div>

</div>

<script>

const VR_KEY = "vr_history";

/* =========================
   CITY STATE
========================= */
let currentCity = "real";

/* =========================
   CHAT
========================= */
async function chat(){

  const inputEl = document.getElementById("rpgMemo");
  const text = inputEl.value;

  if(!text.trim()){
    log("[ERROR] EMPTY INPUT");
    return;
  }

  log("[INPUT] " + text);
  log("[CITY SEND] " + currentCity);

  try{

    log("[SERVER] sending request → Node");

    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text,
        city: currentCity
      })
    });

    log("[SERVER] response received");

    const data = await res.json();

    if(data.error){
      log("[ERROR] " + data.error);
      showAI(text, data.error);
      return;
    }

    log("[AI] response OK");

    showAI(text, data.reply);

    log("[AI LOG] " + data.reply);

    /* 💣ここ追加：入力欄クリア */
    inputEl.value = "";

  }catch(e){

    log("[ERROR] NETWORK: " + e.message);
    showAI(text, "[NETWORK ERROR]");

  }
}

/* =========================
   AI DISPLAY
========================= */
function showAI(input, reply){

  document.getElementById("aiOut").innerText =
`WORLD: ${currentCity.toUpperCase()}

YOU:
${input}

AI:
${reply}`;
}

/* =========================
   CITY SWITCH (強化版)
========================= */
async function setCity(type){

  currentCity = type;

  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  log("[CITY SWITCH] " + type);

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: "__CITY_SYNC__",
        city: currentCity
      })
    });

    const data = await res.json();
    log("[CITY SYNC SERVER] " + JSON.stringify(data.debug || {}));

  } catch(e) {
    log("[CITY SYNC ERROR] " + e.message);
  }
}

/* =========================
   LOG SYSTEM
========================= */
function log(text){

  const now = new Date();
  const entry = `[${now.toLocaleString()}] ${text}`;

  let logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");
  logs.push(entry);

  localStorage.setItem(VR_KEY, JSON.stringify(logs));

  renderVR();
}

/* =========================
   VR RENDER
========================= */
function renderVR(){

  const vr = document.getElementById("vrOut");
  const logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  vr.innerText = logs.join("\n");

  vr.scrollTop = vr.scrollHeight;
}

renderVR();

</script>

</body>
</html>
