<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#fff;
  font-family:sans-serif;
}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  overflow:auto;
}

h2{
  font-size:18px;
  margin-bottom:10px;
}

button{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#222;
  color:#fff;
  border:1px solid #444;
  cursor:pointer;
}

pre{
  white-space:pre-wrap;
  color:#aaa;
}

/* ===== MODE THEME ===== */

body.mode-ai{
  background:#0b1020;
  color:#cfe3ff;
}

body.mode-ai .panel{
  border-color:#2b4d7a;
}

body.mode-vr{
  background:#061a14;
  color:#bfffe5;
}

body.mode-vr .panel{
  border-color:#1f6b4d;
}

body.mode-rpg{
  background:#1a0f0f;
  color:#ffe0c8;
}

body.mode-rpg .panel{
  border-color:#7a3b2b;
}
</style>
</head>

<body>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / DESIGN</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>
</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI NODE / GENERATION</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel">
<h2>🟩 VR NODE / OBSERVATION</h2>
<pre id="vrOut"></pre>
</div>

</div>

<script>

/* =========================
   MODE & CITY 分離設計
========================= */

const params = new URLSearchParams(location.search);

const mode = params.get("mode") || "rpg";
const cityType = params.get("city") || "cyber";

/* 見た目モード適用 */
document.body.classList.add("mode-" + mode);

let cityState = "cyber";
let vrInterval;

/* =========================
   VR LOG SYSTEM（安全版）
========================= */

function startVRLog(type){

  clearInterval(vrInterval);

  const logs = {
    cyber: [
      "neon signal fluctuation detected",
      "urban network density rising",
      "cyber district pulse unstable"
    ],
    real: [
      "traffic flow stabilizing",
      "population distribution normalized",
      "infrastructure load balanced"
    ],
    mixed: [
      "hybrid zone synchronization active",
      "dual-layer city pattern detected",
      "environmental mismatch corrected"
    ]
  };

  const list = logs[type] || logs.cyber;

  let i = 0;

  vrInterval = setInterval(() => {

    const log = list[i % list.length];
    const time = new Date().toLocaleTimeString();

    document.getElementById("vrOut").innerText +=
`\n[${time}] ${log}`;

    i++;
  }, 2000);
}

/* =========================
   CITY SYSTEM
========================= */

function setCity(type){

  cityState = type;

  /* RPG */
  document.getElementById("rpgOut").innerText =
`CURRENT DESIGN:
→ ${type.toUpperCase()} CITY`;

  /* AI */
  let aiResult = "";

  switch(type){
    case "cyber":
      aiResult = "NEON HIGH-DENSITY CITY GENERATED";
      break;
    case "real":
      aiResult = "REALISTIC URBAN STRUCTURE GENERATED";
      break;
    case "mixed":
      aiResult = "HYBRID CITY STRUCTURE GENERATED";
      break;
    default:
      aiResult = "UNKNOWN CITY STATE";
  }

  document.getElementById("aiOut").innerText =
`STATUS: RUNNING

OUTPUT:
${aiResult}`;

  /* VR RESET */
  document.getElementById("vrOut").innerText =
`OBSERVATION LOG

CITY TYPE: ${type}
--- LIVE FEED START ---`;

  /* ★重要：VRモード時だけログ起動 */
  if(mode === "vr"){
    startVRLog(type);
  }
}

/* =========================
   INIT
========================= */

setCity(cityType);

</script>

</body>
</html>
