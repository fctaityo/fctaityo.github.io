<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ddd;
  font-family:sans-serif;
  overflow:hidden;
}

/* topbar */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
}

/* main */
.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
  overflow:hidden;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  height:calc(100vh - 60px);
  overflow-y:auto;
  box-sizing:border-box;
}

/* 見出し完全統一 */
h2{
  font-size:18px;
  margin:0 0 10px 0;
}

/* ボタン */
button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:inherit;
  border:1px solid #444;
  cursor:pointer;
}

/* テキスト */
pre{
  white-space:pre-wrap;
}

/* textarea */
textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:inherit;
  border:1px solid #333;
  padding:10px;
  box-sizing:border-box;
  resize:none;
}

/* =========================
   VRだけ完全分離設計
========================= */
#vrPanel{
  display:flex;
  flex-direction:column;
  overflow:hidden; /* 外スクロール禁止 */
}

/* ヘッダーは通常フロー */
.vrHeader{
  flex:0 0 auto;
  border-bottom:1px solid #222;
  padding-bottom:10px;
}

/* ログ領域だけスクロール */
#vrOut{
  flex:1;
  overflow-y:auto;
  padding-top:10px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">FCTAITYO CITY</div>
</div>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / INPUT</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>

<textarea id="rpgMemo"></textarea>
<button onclick="saveMemo()">SAVE</button>
<button onclick="loadMemo()">LOAD</button>
</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI / TRANSFORM</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel" id="vrPanel">

<h2 class="vrHeader">🟩 VR / HISTORY</h2>

<pre id="vrOut"></pre>

</div>

</div>

<script>

const MEMO_KEY = "memo_rpg";
const VR_KEY = "vr_history";

/* VR LOG */
function pushVRLog(text){
  const time = new Date().toLocaleTimeString();
  let logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  logs.push(`[${time}] ${text}`);
  localStorage.setItem(VR_KEY, JSON.stringify(logs));

  renderVR();
}

/* RENDER */
function renderVR(){
  const vr = document.getElementById("vrOut");
  const logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  vr.innerText = "----------------\n" + logs.join("\n");

  vr.scrollTop = vr.scrollHeight;
}

/* CITY */
function setCity(type){
  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  document.getElementById("aiOut").innerText =
`AI TRANSFORM:
INPUT: ${type}
OUTPUT: ${type.toUpperCase()} SYSTEM MODEL`;

  pushVRLog(`RPG input: ${type}`);
  pushVRLog(`AI transformed: ${type}`);
  pushVRLog(`SYSTEM updated`);
}

/* MEMO */
function saveMemo(){
  localStorage.setItem(MEMO_KEY, document.getElementById("rpgMemo").value);
  pushVRLog("memo saved");
}

function loadMemo(){
  document.getElementById("rpgMemo").value =
    localStorage.getItem(MEMO_KEY) || "";
  pushVRLog("memo loaded");
}

/* INIT */
loadMemo();
renderVR();
setCity("cyber");

</script>

</body>
</html>
