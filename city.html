<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ddd;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
  cursor:pointer;
  white-space:nowrap;
}

/* ===== LAYOUT ===== */
.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  overflow:auto;
}

button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:inherit;
  border:1px solid #444;
  cursor:pointer;
}

pre{
  white-space:pre-wrap;
  color:inherit;
}

/* ===== MEMO ===== */
textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:inherit;
  border:1px solid #333;
  padding:10px;
  box-sizing:border-box;
  resize:none;
}

/* ===== SIMPLE THEME ===== */
.panel{
  border-color:#333;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">
    FCTAITYO CITY
  </div>
</div>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / INPUT</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>

<textarea id="rpgMemo" placeholder="RPGメモ"></textarea>
<button onclick="saveMemo()">SAVE</button>
<button onclick="loadMemo()">LOAD</button>

</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI / TRANSFORM</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel">
<h2>🟩 VR / HISTORY</h2>
<pre id="vrOut"></pre>
</div>

</div>

<script>

const MEMO_KEY = "memo_rpg";

/* ★VRログ永続キー */
const VR_KEY = "vr_history";

/* ===== VR LOG CORE（永続化版） ===== */
function pushVRLog(text){

  const time = new Date().toLocaleTimeString();
  const entry = `[${time}] ${text}`;

  // 既存ログ取得
  let logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  // 追加
  logs.push(entry);

  // 保存
  localStorage.setItem(VR_KEY, JSON.stringify(logs));

  // 表示更新
  renderVR();
}

/* ===== VR描画 ===== */
function renderVR(){
  const vr = document.getElementById("vrOut");
  const logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  vr.innerText = "VR HISTORY\n----------------\n" + logs.join("\n");
}

/* ===== CITY FLOW ===== */
function setCity(type){

  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  document.getElementById("aiOut").innerText =
`AI TRANSFORM:
INPUT: ${type}
OUTPUT: ${type.toUpperCase()} SYSTEM MODEL`;

  pushVRLog(`RPG input: ${type}`);
  pushVRLog(`AI transformed: ${type}`);
  pushVRLog(`SYSTEM updated`);
}

/* ===== MEMO ===== */
function saveMemo(){
  const text = document.getElementById("rpgMemo").value;
  localStorage.setItem(MEMO_KEY, text);

  pushVRLog("memo saved");
}

function loadMemo(){
  document.getElementById("rpgMemo").value =
    localStorage.getItem(MEMO_KEY) || "";

  pushVRLog("memo loaded");
}

/* ===== INIT ===== */
loadMemo();
renderVR();
setCity("cyber");

</script>

</body>
</html>
