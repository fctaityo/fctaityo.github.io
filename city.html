<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FCTAITYO CITY - MINI SYSTEM</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#ddd;
  font-family:sans-serif;
  overflow:hidden;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:#111;
  border-bottom:1px solid #222;
  z-index:999;
  box-sizing:border-box;
}

.logo{
  font-weight:bold;
  letter-spacing:2px;
  cursor:pointer;
  white-space:nowrap;
}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:100vh;
  padding-top:60px;
  overflow:hidden;
}

.panel{
  border-right:1px solid #222;
  padding:20px;
  height:calc(100vh - 60px);
  overflow:hidden; /* ★ここ重要：外は殺す */
}

.scroll{
  height:100%;
  overflow-y:auto;
  scroll-behavior:smooth;
  padding-right:8px;
}

button{
  margin:10px 0;
  padding:10px;
  background:#222;
  color:inherit;
  border:1px solid #444;
  cursor:pointer;
}

textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#111;
  color:inherit;
  border:1px solid #333;
  padding:10px;
  box-sizing:border-box;
  resize:none;
}

/* VR専用 */
#vrText{
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">
    FCTAITYO CITY
  </div>
</div>

<div class="wrap">

<!-- RPG -->
<div class="panel">
<h2>🟥 RPG / INPUT</h2>

<button onclick="setCity('cyber')">CYBER CITY</button>
<button onclick="setCity('real')">REAL CITY</button>
<button onclick="setCity('mixed')">MIX CITY</button>

<pre id="rpgOut"></pre>

<textarea id="rpgMemo"></textarea>
<button onclick="saveMemo()">SAVE</button>
<button onclick="loadMemo()">LOAD</button>
</div>

<!-- AI -->
<div class="panel">
<h2>🟦 AI / TRANSFORM</h2>
<pre id="aiOut"></pre>
</div>

<!-- VR -->
<div class="panel">
<h2>🟩 VR / HISTORY</h2>

<div class="scroll" id="vrPanel">
  <div id="vrText"></div>
</div>

</div>

</div>

<script>

const MEMO_KEY = "memo_rpg";
const VR_KEY = "vr_history";

function pushVRLog(text){

  const time = new Date().toLocaleTimeString();
  const entry = `[${time}] ${text}`;

  let logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  logs.push(entry);

  localStorage.setItem(VR_KEY, JSON.stringify(logs));

  renderVR();
}

function renderVR(){

  const vr = document.getElementById("vrText");
  const panel = document.getElementById("vrPanel");

  const logs = JSON.parse(localStorage.getItem(VR_KEY) || "[]");

  vr.innerText =
`VR HISTORY
----------------
` + logs.join("\n");

  /* ★確実に一箇所だけスクロール */
  requestAnimationFrame(() => {
    panel.scrollTop = panel.scrollHeight;
  });
}

function setCity(type){

  document.getElementById("rpgOut").innerText =
`CITY:
→ ${type.toUpperCase()}`;

  document.getElementById("aiOut").innerText =
`AI TRANSFORM:
INPUT: ${type}
OUTPUT: ${type.toUpperCase()} SYSTEM MODEL`;

  pushVRLog(`RPG input: ${type}`);
  pushVRLog(`AI transformed: ${type}`);
  pushVRLog(`SYSTEM updated`);
}

function saveMemo(){
  const text = document.getElementById("rpgMemo").value;
  localStorage.setItem(MEMO_KEY, text);
  pushVRLog("memo saved");
}

function loadMemo(){
  document.getElementById("rpgMemo").value =
    localStorage.getItem(MEMO_KEY) || "";
  pushVRLog("memo loaded");
}

loadMemo();
renderVR();
setCity("cyber");

</script>

</body>
</html>
