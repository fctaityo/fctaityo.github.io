<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // NODE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --sub:#aaa;
  --main:#8d5cff;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow-x:hidden;
}

/* ===== layout ===== */

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

/* ===== header ===== */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

/* ロゴ */
.logo{
  font-family:'Orbitron';
  letter-spacing:5px;
  font-size:3.5rem;
  text-shadow:0 0 18px rgba(141,92,255,0.6);
  cursor:pointer;
}

.logo span{
  color:var(--main);
}

/* ===== NAV ===== */

nav{
  display:flex;
  gap:18px;
  align-items:center;
}

nav a{
  font-family:'Orbitron';
  font-size:16px;
  letter-spacing:2px;
  color:var(--text);
  text-decoration:none;
  padding:10px 14px;
  border:1px solid transparent;
  transition:0.2s;
}

nav a:hover{
  border-color:var(--main);
  transform:translateY(-2px);
  text-shadow:0 0 10px rgba(141,92,255,0.6);
}

/* ===== HERO ===== */

.hero{
  padding:80px 0 40px;
}

.hero h1{
  font-size:3rem;
  font-family:'Orbitron';
}

.hero p{
  color:var(--sub);
  margin-top:10px;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:40px;
}

.node{
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
  background:rgba(255,255,255,0.02);
}

.node:hover{
  transform:translateY(-6px);
  border-color:var(--main);
  box-shadow:0 0 30px rgba(141,92,255,0.15);
}

.node-img{
  height:160px;
  background-size:cover;
  background-position:center;
  filter:brightness(0.9);
}

.node-body{
  padding:18px;
}

.node h3{
  margin-bottom:6px;
  font-size:1.3rem;
}

.node p{
  font-size:0.9rem;
  color:var(--sub);
}

/* ===== SIDE PANEL ===== */

.panel{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100vh;
  background:#111;
  border-left:1px solid var(--line);
  padding:30px;
  transition:0.3s;
  overflow-y:auto;
  z-index:999;
}

.panel.active{
  right:0;
}

.panel h2{
  font-family:'Orbitron';
  margin-bottom:20px;
  font-size:2rem;
}

.panel pre{
  white-space:pre-wrap;
  color:#ddd;
  font-size:0.95rem;
  line-height:1.8;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  cursor:pointer;
  color:#aaa;
  font-size:1.2rem;
}

.enter-btn{
  margin-top:24px;
  width:100%;
  padding:14px;
  background:#181818;
  color:#fff;
  border:1px solid #333;
  cursor:pointer;
  font-family:'Orbitron';
  letter-spacing:2px;
  transition:0.2s;
}

.enter-btn:hover{
  border-color:var(--main);
  box-shadow:0 0 20px rgba(141,92,255,0.3);
}

</style>
</head>

<body>

<header>
<div class="container header-inner">

  <div class="logo" onclick="location.href='index.html'">
    FCTAITYO <span>CITY</span>
  </div>

  <nav>
    <a href="city.html?mode=rpg">RPG NODE</a>
    <a href="city.html?mode=ai">AI NODE</a>
    <a href="city.html?mode=vr">VR NODE</a>
  </nav>

</div>
</header>

<main class="container">

<section class="hero">

  <h1>NODE SYSTEM CITY</h1>
  <p>クリックで都市ノードへアクセス</p>

  <div class="grid">

    <!-- RPG -->
    <div class="node" onclick="openNode('rpg')">

      <div class="node-img"
      style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400&auto=format&fit=crop');">
      </div>

      <div class="node-body">
        <h3>不存在RPG計画</h3>
        <p>世界構築 / 都市設計 / シナリオ管理</p>
      </div>

    </div>

    <!-- AI -->
    <div class="node" onclick="openNode('ai')">

      <div class="node-img"
      style="background-image:url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1400&auto=format&fit=crop');">
      </div>

      <div class="node-body">
        <h3>AI NODE</h3>
        <p>生成エンジン / 実験区画 / SYSTEM CORE</p>
      </div>

    </div>

    <!-- VR -->
    <div class="node" onclick="openNode('vr')">

      <div class="node-img"
      style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72?q=80&w=1400&auto=format&fit=crop');">
      </div>

      <div class="node-body">
        <h3>VR NODE</h3>
        <p>観測ログ / 非言語解析 / SOCIAL SCAN</p>
      </div>

    </div>

  </div>

</section>

</main>

<!-- PANEL -->

<div class="panel" id="panel">

  <div class="close" onclick="closePanel()">✕</div>

  <h2 id="panelTitle"></h2>

  <pre id="panelBody"></pre>

  <button class="enter-btn" id="enterBtn">
    ENTER NODE
  </button>

</div>

<script>

const data = {

rpg:{
title:"不存在RPG計画",
body:`
■ ROLE
WORLD DESIGN SYSTEM

■ FUNCTION
- 世界観構築
- 都市設計
- NPC構造管理
- クエスト設計

■ STATUS
ARCHITECT MODE ACTIVE
`,
link:"city.html?mode=rpg"
},

ai:{
title:"AI NODE",
body:`
■ STATUS
RUNNING : CITY GENERATION CORE

■ ROLE
SYSTEM CONTROL LAYER

■ FUNCTION
- PROMPT LAB
- IMAGE PIPELINE
- CITY GENERATOR
- NEURAL TEST

■ OUTPUT
・仮想都市生成
・UI実験
・広告構造生成
`,
link:"city.html?mode=ai"
},

vr:{
title:"VR NODE",
body:`
■ ROLE
OBSERVATION SYSTEM

■ FUNCTION
- LIVE SOCIAL SCAN
- VRC ANALYSIS
- EMOTION TRACE
- INSTANCE MONITOR

■ STATUS
OBSERVATION MODE ACTIVE
`,
link:"city.html?mode=vr"
}

};

function openNode(key){

  document.getElementById("panel").classList.add("active");

  document.getElementById("panelTitle").innerText =
  data[key].title;

  document.getElementById("panelBody").innerText =
  data[key].body;

  document.getElementById("enterBtn").onclick = () => {
    location.href = data[key].link;
  };
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
