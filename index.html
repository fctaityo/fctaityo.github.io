<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // INTEGRATED NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --cyber:#00e5ff;
  --real:#7CFF6B;
  --mix:#ff4fd8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}
.logo span{ color:var(--mix); }

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:20px;
  height:calc(100vh - 100px);
  padding-top:20px;
}

/* LEFT PANEL (INPUT & CONTROL) */
.leftPanel{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.controlSection{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:rgba(255,255,255,0.02);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.cityBtn{
  padding:12px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  cursor:pointer;
  transition: 0.3s;
  font-size: 0.8rem;
}
.cityBtn:hover{
  background: #222;
  border-color: var(--mix);
}
.cityBtn.active{
  border-color: var(--mix);
  background: rgba(255, 79, 216, 0.1);
}

/* CHAT INPUT AREA */
.chatSection{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:rgba(255,255,255,0.03);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.chat-label{
  font-family: 'Orbitron';
  font-size: 0.7rem;
  color: var(--mix);
  letter-spacing: 1px;
}

#chatInput{
  background: #000;
  border: 1px solid #333;
  color: #fff;
  padding: 12px;
  font-size: 0.9rem;
  font-family: inherit;
  resize: none;
  outline: none;
  border-radius: 4px;
}
#chatInput:focus{ border-color: var(--mix); }

.sendBtn{
  background: var(--mix);
  color: #000;
  border: none;
  padding: 8px;
  font-family: 'Orbitron';
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.2s;
}
.sendBtn:hover{ opacity: 0.8; }

/* RIGHT PANEL (OBSERVATION) */
.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  background:#111;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.statusSection {
  padding: 20px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.01);
}

.scrollSection {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-bottom: 1px solid var(--line);
}

.sectionTitle {
  padding: 10px 20px 5px 20px;
  font-family: 'Orbitron';
  font-size: 0.7rem;
  color: var(--mix);
  background: rgba(0,0,0,0.2);
}

.scrollContent {
  flex-grow: 1;
  overflow-y: scroll;
  padding: 0 20px 20px 20px;
  background: rgba(0,0,0,0.2);
}

.stateBox{ white-space:pre-wrap; line-height:1.5; color:#ddd; font-size: 0.8rem; }
.memoryDisplay { font-size: 0.8rem; color: #bbb; white-space: pre-wrap; line-height: 1.6; }
.log{ font-size:0.7rem; color:#555; font-family: 'monospace'; line-height: 1.4; white-space: pre-wrap; }

/* NEWS AREA */
.newsSection{
  border:1px solid var(--line);
  border-radius:14px;
  padding:15px;
  background:rgba(0,0,0,0.4);
}
.news-label {
  font-family: 'Orbitron';
  font-size: 10px;
  color: var(--mix);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
#newsDisplay { font-size: 11px; color: #aaa; line-height: 1.5; min-height: 3em; }
.refresh-btn { background: transparent; border: 1px solid #444; color: #777; font-size: 8px; cursor: pointer; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--mix); }

</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="logo" onclick="location.reload()">FCTAITYO <span>CITY</span></div>
  </div>
</header>

<div class="container main">

<div class="leftPanel">
  <div class="controlSection">
    <div class="chat-label">SELECT_CITY_MODE</div>
    <button class="cityBtn" id="btn-cyber" onclick="selectCity('cyber')">CYBER CITY</button>
    <button class="cityBtn" id="btn-real" onclick="selectCity('real')">REAL CITY</button>
    <button class="cityBtn" id="btn-mixed" onclick="selectCity('mixed')">MIX CITY</button>
    <div id="syncState" style="font-size:10px; color:#555; font-family:'Orbitron';">SYNC: WAITING...</div>
  </div>

  <div class="chatSection">
    <div class="chat-label">INTERVENTION_INPUT</div>
    <textarea id="chatInput" rows="4" placeholder="メッセージを入力して介入..."></textarea>
    <button class="sendBtn" onclick="sendMessage()">EXECUTE_SEND</button>
  </div>

  <div class="newsSection">
    <div class="news-label">
      <span>WORLD_NEWS_FEED</span>
      <button class="refresh-btn" onclick="updateNews()">RELOAD</button>
    </div>
    <div id="newsDisplay">Waiting for sync...</div>
  </div>
</div>

<div class="observePanel">
  <div class="statusSection">
    <div id="stateView" class="stateBox">CITYを選択してください</div>
  </div>

  <div class="scrollSection">
    <div class="sectionTitle">RECENT_MEMORY_BUFFER</div>
    <div class="scrollContent" id="memoryScrollArea">
      <div id="memoryView" class="memoryDisplay">NO_DATA_SYNCED</div>
    </div>
  </div>

  <div class="scrollSection">
    <div class="sectionTitle">SYSTEM_LOG_STREAM</div>
    <div class="scrollContent" id="logScrollArea">
      <div class="log" id="logBox"></div>
    </div>
  </div>
</div>

</div>

<script>
const API = "http://localhost:3000";
let currentCity = "real";

window.addEventListener('DOMContentLoaded', () => {
  refreshState();
  updateNews();
  
  // Enterキーで送信 (Shift+Enterで改行)
  document.getElementById("chatInput").addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

async function selectCity(key){
  currentCity = key;
  addLog("MODE_SWITCH: " + key);
  
  document.querySelectorAll('.cityBtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key).classList.add('active');

  try {
    await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ text:"__CITY_SYNC__", city:key })
    });
    refreshState();
  } catch(e) { addLog("SYNC_ERROR: " + e.message); }
}

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text) return;

  addLog("INTERVENTION: " + text.substring(0,15) + "...");
  input.value = "";
  input.disabled = true;

  try {
    await fetch(API + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text, city: currentCity })
    });
    addLog("RESPONSE_RECEIVED");
    refreshState();
  } catch(e) {
    addLog("COMM_ERROR: " + e.message);
  } finally {
    input.disabled = false;
    input.focus();
  }
}

async function updateNews(){
  const newsEl = document.getElementById("newsDisplay");
  newsEl.innerText = "FETCHING...";
  try {
    const res = await fetch(API + "/api/news");
    const data = await res.json();
    newsEl.innerText = data.news || "NO_DATA";
    addLog("NEWS_UPDATED");
  } catch(e) { newsEl.innerText = "OFFLINE"; }
}

async function refreshState(){
  try{
    const res = await fetch(API + "/state");
    const data = await res.json();
    
    // UI更新
    document.getElementById("stateView").innerText = 
      `CITY: ${data.city.toUpperCase()} | STATUS: ONLINE | MEM: ${data.memorySize} units`;
    document.getElementById("memoryView").innerText = data.recentMemory || "WAITING...";
    document.getElementById("syncState").innerText = `SYNC: ${data.city} / MEM:${data.memorySize}`;
    
    // スクロールを一番下へ
    const memArea = document.getElementById("memoryScrollArea");
    memArea.scrollTop = memArea.scrollHeight;
  }catch(e){ console.error(e); }
}

function addLog(text){
  const el = document.getElementById("logBox");
  const time = new Date().toLocaleTimeString();
  el.innerText += `[${time}] ${text}\n`;
  document.getElementById("logScrollArea").scrollTop = el.scrollHeight;
}

// 5秒ごとに状態を自動更新
setInterval(refreshState, 5000);
</script>

</body>
</html>
