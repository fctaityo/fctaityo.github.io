<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // OBSERVATION NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --cyber:#00e5ff;
  --real:#7CFF6B;
  --mix:#ff4fd8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}

.logo span{ color:var(--mix); }

nav a{
  font-family:'Orbitron';
  color:var(--text);
  text-decoration:none;
  font-size:14px;
  padding:8px 12px;
  border:1px solid #333;
}

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  height:calc(100vh - 100px); /* ヘッダー分を考慮 */
  padding-top:20px;
}

.selectPanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  background:rgba(255,255,255,0.02);
}

.cityBtn{
  padding:18px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  cursor:pointer;
  transition: 0.3s;
}

.cityBtn:hover{
  background: #222;
  border-color: var(--mix);
}

/* --- 右側パネル全体の構造 --- */
.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  background:#111;
  display: flex;
  flex-direction: column; /* 縦に並べる */
  overflow: hidden; /* 親パネル自体はスクロールさせない */
}

/* 上部：固定ステータスエリア */
.statusSection {
  padding: 20px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0; /* 縮ませない */
}

/* 下部：独立スクロールログエリア */
.logSection {
  flex-grow: 1; /* 余ったスペースをすべて使う */
  overflow-y: auto; /* ここだけスクロール */
  padding: 20px;
  background: rgba(0,0,0,0.2);
  scroll-behavior: smooth;
}

.title{
  font-family:'Orbitron';
  margin-bottom:15px;
  color: var(--mix);
  font-size: 0.9rem;
}

.stateBox{
  white-space:pre-wrap;
  line-height:1.6;
  color:#ddd;
  font-size: 0.85rem;
}

.sync{
  margin-top:10px;
  font-size:12px;
  color:#777;
}

.news-container {
  margin-top: auto;
  padding-top: 15px;
  border-top: 1px dashed #333;
}

.news-label {
  font-family: 'Orbitron';
  font-size: 10px;
  color: var(--mix);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

#newsDisplay {
  font-size: 11px;
  color: #aaa;
  line-height: 1.5;
  min-height: 3em;
}

.refresh-btn {
  margin-top: 10px;
  background: transparent;
  border: 1px solid #444;
  color: #777;
  font-size: 10px;
  font-family: 'Orbitron';
  padding: 4px 8px;
  cursor: pointer;
}

.refresh-btn:hover {
  color: var(--text);
  border-color: var(--text);
}

.log{
  font-size:0.75rem;
  color:#666;
  font-family: 'monospace';
  line-height: 1.4;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo" onclick="location.reload()">
      FCTAITYO <span>CITY</span>
    </div>

    <nav>
      <a href="city.html">NODE SYSTEM</a>
    </nav>
  </div>
</header>

<div class="container main">

<div class="selectPanel">
  <button class="cityBtn" onclick="selectCity('cyber')">CYBER CITY</button>
  <button class="cityBtn" onclick="selectCity('real')">REAL CITY</button>
  <button class="cityBtn" onclick="selectCity('mixed')">MIX CITY</button>

  <div class="sync" id="syncState">SYNC: waiting...</div>

  <div class="news-container">
    <div class="news-label">
      <span>WORLD_NEWS_FEED</span>
      <button class="refresh-btn" onclick="updateNews()">RELOAD</button>
    </div>
    <div id="newsDisplay">Waiting for manual sync...</div>
  </div>
</div>

<div class="observePanel">
  <div class="statusSection">
    <div class="title">CITY_STATUS_OBSERVER</div>
    <div id="stateView" class="stateBox">CITYを選択してください</div>
  </div>

  <div class="logSection" id="logScrollArea">
    <div class="title" style="font-size: 0.7rem; opacity: 0.6;">SYSTEM_LOG_STREAM</div>
    <div class="log" id="logBox"></div>
  </div>
</div>

</div>

<script>
const API = "http://localhost:3000";
let refreshing = false;

window.addEventListener('DOMContentLoaded', () => {
  const savedLogs = localStorage.getItem("observation_logs");
  if (savedLogs) {
    document.getElementById("logBox").innerText = savedLogs;
    scrollToBottom();
  }
  refreshState();
});

async function selectCity(key){
  addLog("CITY REQUEST: " + key);
  try{
    await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ text:"__CITY_SYNC__", city:key })
    });
    await refreshState();
    addLog("SERVER CONFIRMED: " + key);
  }catch(e){
    addLog("SYNC ERROR: " + e.message);
  }
}

async function updateNews(){
  const newsEl = document.getElementById("newsDisplay");
  newsEl.innerText = "FETCHING LATEST LOGS...";
  try {
    const res = await fetch(API + "/api/news");
    const data = await res.json();
    newsEl.innerText = data.news;
    addLog("NEWS FEED UPDATED: " + data.news.substring(0, 20) + "...");
  } catch(e) {
    newsEl.innerText = "NEWS_OFFLINE";
    addLog("NEWS ERROR: " + e.message);
  }
}

async function refreshState(){
  if (refreshing) return;
  refreshing = true;
  try{
    const res = await fetch(API + "/state");
    const data = await res.json();
    renderState(data);
    document.getElementById("syncState").innerText =
      `SYNC: ${data.city} / MEM:${data.memorySize ?? "?"}`;
  }catch(e){
    console.error("State Fetch Error:", e);
  } finally {
    refreshing = false;
  }
}

function renderState(data){
  const el = document.getElementById("stateView");
  el.innerText =
`CURRENT CITY: ${data.city.toUpperCase()}
STATUS: ACTIVE_NODE
LAST SYNC: ${data.lastSync ? new Date(data.lastSync).toLocaleTimeString() : "N/A"}
MEMORY: ${data.memorySize ?? 0} units
PROFILE: ${data.profile?.state || "N/A"}
BEHAVIOR: ${data.profile?.behavior || "N/A"}`;
}

function addLog(text){
  const el = document.getElementById("logBox");
  const time = new Date().toLocaleTimeString();
  const logLine = `[${time}] ${text}\n`;
  
  el.innerText += logLine;
  
  let logs = localStorage.getItem("observation_logs") || "";
  logs += logLine;
  if(logs.length > 5000) logs = logs.substring(logs.length - 5000);
  localStorage.setItem("observation_logs", logs);
  
  scrollToBottom();
}

function scrollToBottom() {
  const area = document.getElementById("logScrollArea");
  area.scrollTop = area.scrollHeight;
}

window.clearLogs = () => {
  localStorage.removeItem("observation_logs");
  document.getElementById("logBox").innerText = "";
  addLog("LOG_BUFFER_CLEARED");
};

setInterval(refreshState, 3000);
</script>

</body>
</html>
