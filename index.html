<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // NODE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --sub:#aaa;
  --main:#8d5cff;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow-x:hidden;
}

/* ===== layout ===== */

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

/* ===== header ===== */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:5px;
  font-size: 4rem;
  text-shadow: 0 0 18px rgba(141,92,255,0.6);
}

.logo span{color:var(--main);}

/* ===== HERO ===== */

.hero{
  padding:80px 0 40px;
}

.hero h1{
  font-size:3rem;
  font-family:'Orbitron';
}

.hero p{
  color:var(--sub);
  margin-top:10px;
}

/* ===== NODE GRID (都市化復活版) ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:40px;
}

/* ★都市カード化 */
.node{
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
  background:rgba(255,255,255,0.02);
}

.node:hover{
  transform:translateY(-6px);
  border-color:var(--main);
}

/* ★画像エリア復活 */
.node-img{
  height:160px;
  background-size:cover;
  background-position:center;
  filter:brightness(0.9);
}

.node-body{
  padding:18px;
}

.node h3{
  margin-bottom:6px;
}

.node p{
  font-size:0.9rem;
  color:var(--sub);
}

/* ===== SIDE PANEL ===== */

.panel{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100vh;
  background:#111;
  border-left:1px solid var(--line);
  padding:30px;
  transition:0.3s;
  overflow-y:auto;
  z-index:999;
}

.panel.active{
  right:0;
}

.panel h2{
  font-family:'Orbitron';
  margin-bottom:20px;
}

.panel pre{
  white-space:pre-wrap;
  color:#ddd;
  font-size:0.9rem;
  line-height:1.7;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  cursor:pointer;
  color:#aaa;
}

</style>
</head>

<body>

<header>
<div class="container header-inner">

  <div class="logo">FCTAITYO <span>CITY</span></div>

  <nav>
    <a href="city.html?mode=rpg">RPG NODE</a>
    <a href="city.html?mode=ai">AI NODE</a>
    <a href="city.html?mode=vr">VR NODE</a>
  </nav>

</div>
</header>

<main class="container">

<section class="hero">
  <h1>NODE SYSTEM CITY</h1>
  <p>クリックで都市ノードを開くインタラクティブUI</p>

  <div class="grid">

    <div class="node" onclick="openNode('rpg')">
      <div class="node-img" style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400&auto=format&fit=crop');"></div>
      <div class="node-body">
        <h3>不存在RPG計画</h3>
        <p>都市型オープンワールド設計</p>
      </div>
    </div>

    <div class="node" onclick="location.href='city.html?mode=ai'">
      <div class="node-img" style="background-image:url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1400&auto=format&fit=crop');"></div>
      <div class="node-body">
        <h3>AI NODE</h3>
        <p>都市生成エンジン / UI実験区画</p>
      </div>
    </div>

    <div class="node" onclick="openNode('vr')">
      <div class="node-img" style="background-image:url('https://images.unsplash.com/photo-1526378722484-bd91ca387e72?q=80&w=1400&auto=format&fit=crop');"></div>
      <div class="node-body">
        <h3>VR NODE</h3>
        <p>非言語コミュニケーション解析</p>
      </div>
    </div>

  </div>

</section>

</main>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="close" onclick="closePanel()">✕</div>

<h2 id="panelTitle"></h2>
<pre id="panelBody"></pre>

</div>

<script>

const data = {

rpg: {
title:"不存在RPG計画",
body:`
■ ROLE
都市型オープンワールド設計区画

■ FUNCTION
- 世界観構築
- UI設計
- 架空都市シナリオ生成

■ STATUS
ARCHITECT MODE ACTIVE
`
},

ai: {
title:"AI NODE",
body:`
■ STATUS
RUNNING: CITY GENERATION CORE

■ ROLE
都市構造生成エンジン

■ FUNCTION
- プロンプト生成ログ
- UIレイアウト実験
- 仮想都市設計

■ OUTPUT
・デジタル都市構造案
・広告UIプロトタイプ
・架空空間設計ログ
`
},

vr: {
title:"VR NODE",
body:`
■ ROLE
非言語コミュニケーション解析

■ FUNCTION
- VRCログ分析
- 人間関係パターン観測
- 行動データ収集

■ STATUS
OBSERVATION MODE ACTIVE
`
}

};

function openNode(key){
document.getElementById("panel").classList.add("active");
document.getElementById("panelTitle").innerText = data[key].title;
document.getElementById("panelBody").innerText = data[key].body;
}

function closePanel(){
document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
