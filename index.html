<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // OBSERVATION NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --cyber:#00e5ff;
  --real:#7CFF6B;
  --mix:#ff4fd8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}

/* =========================
   HEADER ★復活
========================= */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}

.logo span{
  color:var(--mix);
}

nav a{
  font-family:'Orbitron';
  color:var(--text);
  text-decoration:none;
  font-size:14px;
  padding:8px 12px;
  border:1px solid #333;
}

nav a:hover{
  border-color:var(--cyber);
}

/* =========================
   LAYOUT
========================= */
.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  height:calc(100vh - 80px);
  padding-top:20px;
}

/* =========================
   LEFT
========================= */
.selectPanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  background:rgba(255,255,255,0.02);
}

.cityBtn{
  padding:18px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  cursor:pointer;
}

/* =========================
   RIGHT
========================= */
.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:#111;
  overflow:auto;
}

.title{
  font-family:'Orbitron';
  margin-bottom:15px;
}

.stateBox{
  white-space:pre-wrap;
  line-height:1.8;
  border-top:1px solid var(--line);
  padding-top:15px;
  color:#ddd;
}

.sync{
  margin-top:10px;
  font-size:12px;
  color:#777;
}

.log{
  margin-top:20px;
  font-size:0.8rem;
  color:#888;
  border-top:1px solid var(--line);
  padding-top:10px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER復活 -->
<header>
  <div class="container header-inner">

    <div class="logo" onclick="location.reload()">
      FCTAITYO <span>CITY</span>
    </div>

    <nav>
      <a href="city.html">NODE SYSTEM</a>
    </nav>

  </div>
</header>

<div class="container main">

<!-- LEFT -->
<div class="selectPanel">

  <button class="cityBtn" onclick="selectCity('cyber')">CYBER CITY</button>
  <button class="cityBtn" onclick="selectCity('real')">REAL CITY</button>
  <button class="cityBtn" onclick="selectCity('mixed')">MIX CITY</button>

  <div class="sync" id="syncState">SYNC: waiting...</div>

</div>

<!-- RIGHT -->
<div class="observePanel">

  <div class="title">CITY OBSERVER</div>

  <div id="stateView" class="stateBox">CITYを選択してください</div>

  <div class="log" id="logBox"></div>

</div>

</div>

<script>

const API = "http://localhost:3000";

async function selectCity(key){

  addLog("CITY REQUEST: " + key);

  try{
    await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        text:"__CITY_SYNC__",
        city:key
      })
    });

    await refreshState();

    addLog("SERVER CONFIRMED: " + key);

  }catch(e){
    addLog("SYNC ERROR: " + e.message);
  }
}

async function refreshState(){

  try{
    const res = await fetch(API + "/state");
    const data = await res.json();

    document.getElementById("stateView").innerText =
`◆ SERVER CONTROLLED CITY

CURRENT CITY:
${data.city}

STATUS:
ACTIVE NODE STREAM

LAST SYNC:
${data.lastSync || "N/A"}

MEMORY SIZE:
${data.memorySize ?? data.debug?.memorySize ?? "unknown"}

RECENT MEMORY:
${data.recentMemory || "NO DATA"}

PROFILE:
${data.profile?.state || ""}

BEHAVIOR:
${data.profile?.behavior || ""}

SOURCE: /state
`;

    document.getElementById("syncState").innerText =
`SYNC: ${data.city} / MEM:${data.memorySize ?? "?"}`;

  }catch(e){
    addLog("STATE ERROR: " + e.message);
  }
}

function addLog(text){
  const el = document.getElementById("logBox");
  const time = new Date().toLocaleTimeString();
  el.innerText += `[${time}] ${text}\n`;
}

setInterval(refreshState, 2000);

</script>

</body>
</html>
