<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // NODE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --sub:#aaa;
  --main:#8d5cff;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow-x:hidden;
}

/* ===== layout ===== */

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

/* ===== header ===== */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:3px;
}

.logo span{color:var(--main);}

/* ===== HERO ===== */

.hero{
  padding:80px 0;
}

.hero h1{
  font-size:3rem;
  font-family:'Orbitron';
}

.hero p{
  color:var(--sub);
  margin-top:10px;
}

/* ===== NODE GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:40px;
}

.node{
  border:1px solid var(--line);
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.2s;
  background:rgba(255,255,255,0.02);
}

.node:hover{
  transform:translateY(-4px);
  border-color:var(--main);
}

.node h3{
  margin-bottom:8px;
}

.node p{
  font-size:0.9rem;
  color:var(--sub);
}

/* ===== SIDE PANEL ===== */

.panel{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100vh;
  background:#111;
  border-left:1px solid var(--line);
  padding:30px;
  transition:0.3s;
  overflow-y:auto;
  z-index:999;
}

.panel.active{
  right:0;
}

.panel h2{
  font-family:'Orbitron';
  margin-bottom:20px;
}

.panel pre{
  white-space:pre-wrap;
  color:#ddd;
  font-size:0.9rem;
  line-height:1.6;
}

.close{
  position:absolute;
  top:15px;
  right:15px;
  cursor:pointer;
  color:#aaa;
}

</style>
</head>

<body>

<header>
<div class="container header-inner">
  <div class="logo">FCTAITYO <span>CITY</span></div>
</div>
</header>

<main class="container">

<section class="hero">
  <h1>NODE SYSTEM CITY</h1>
  <p>クリックで都市ノードを開くインタラクティブUI</p>

  <div class="grid">

    <div class="node" onclick="openNode('rpg')">
      <h3>不存在RPG計画</h3>
      <p>都市型オープンワールド設計</p>
    </div>

    <div class="node" onclick="openNode('ai')">
      <h3>AI NODE</h3>
      <p>生成・実験・都市エンジン</p>
    </div>

    <div class="node" onclick="openNode('vr')">
      <h3>VR NODE</h3>
      <p>非言語コミュニケーション解析</p>
    </div>

  </div>

</section>

</main>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="close" onclick="closePanel()">✕</div>

<h2 id="panelTitle"></h2>
<pre id="panelBody"></pre>

</div>

<script>

const data = {

rpg: {
title:"不存在RPG計画",
body:`
■ ROLE
都市型オープンワールド設計区画

■ FUNCTION
- 世界観構築
- UI設計
- 架空都市シナリオ生成

■ STATUS
ARCHITECT MODE ACTIVE
`
},

ai: {
title:"AI NODE",
body:`
■ STATUS
RUNNING: CITY GENERATION SYSTEM

■ FUNCTION
- Prompt logging
- UI生成実験
- 世界構築エンジン

■ RECENT OUTPUT
・仮想都市設計
・広告UI建築化
・デジタル空間構造案
`
},

vr: {
title:"VR NODE",
body:`
■ ROLE
非言語コミュニケーション解析

■ FUNCTION
- VRCログ分析
- 人間関係パターン観測
- 行動データ収集

■ STATUS
OBSERVATION MODE ACTIVE
`
}

};

function openNode(key){
document.getElementById("panel").classList.add("active");
document.getElementById("panelTitle").innerText = data[key].title;
document.getElementById("panelBody").innerText = data[key].body;
}

function closePanel(){
document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
