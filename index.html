<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // OBSERVATION NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --sub:#aaa;
  --main:#8d5cff;
  --cyber:#00e5ff;
  --real:#7CFF6B;
  --mix:#ff4fd8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}

/* =========================
   HEADER
========================= */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}

.logo span{
  color:var(--main);
}

nav a{
  font-family:'Orbitron';
  color:var(--text);
  text-decoration:none;
  font-size:14px;
  padding:8px 12px;
  border:1px solid #333;
  transition:0.2s;
}

nav a:hover{
  border-color:var(--main);
  box-shadow:0 0 10px rgba(141,92,255,0.3);
}

/* =========================
   LAYOUT
========================= */
.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  height:calc(100vh - 80px);
  padding-top:20px;
}

/* =========================
   CENTER PANEL
========================= */
.selectPanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  background:rgba(255,255,255,0.02);
}

.cityBtn{
  padding:18px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  letter-spacing:2px;
  cursor:pointer;
  transition:0.2s;
}

.cityBtn:hover{
  transform:translateY(-3px);
  border-color:var(--main);
}

.cyber:hover{ border-color:var(--cyber); }
.real:hover{ border-color:var(--real); }
.mix:hover{ border-color:var(--mix); }

/* =========================
   RIGHT OBSERVER
========================= */
.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:#111;
  overflow:auto;
}

.title{
  font-family:'Orbitron';
  margin-bottom:15px;
  font-size:1.5rem;
}

.stateBox{
  white-space:pre-wrap;
  line-height:1.8;
  font-size:0.95rem;
  color:#ddd;
  border-top:1px solid var(--line);
  padding-top:15px;
}

.log{
  margin-top:20px;
  font-size:0.8rem;
  color:#888;
  border-top:1px solid var(--line);
  padding-top:10px;
  max-height:200px;
  overflow:auto;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border:1px solid #333;
  margin-bottom:10px;
  font-size:0.8rem;
}

.sync{
  margin-top:10px;
  font-size:12px;
  color:#777;
}

</style>
</head>

<body>

<header>
  <div class="container header-inner">

    <div class="logo" onclick="location.reload()">
      FCTAITYO <span>CITY</span>
    </div>

    <nav>
      <a href="city.html">NODE SYSTEM</a>
    </nav>

  </div>
</header>

<div class="container main">

<!-- LEFT -->
<div class="selectPanel">

  <div class="badge">CITY SELECTOR</div>

  <button class="cityBtn cyber" onclick="selectCity('cyber')">
    CYBER CITY
  </button>

  <button class="cityBtn real" onclick="selectCity('real')">
    REAL CITY
  </button>

  <button class="cityBtn mix" onclick="selectCity('mixed')">
    MIX CITY
  </button>

  <div class="sync" id="syncState">
    SYNC: waiting...
  </div>

</div>

<!-- RIGHT -->
<div class="observePanel">

  <div class="title">CITY OBSERVER</div>

  <div id="stateView" class="stateBox">
SERVER STATE LOADING...
  </div>

  <div class="log" id="logBox"></div>

</div>

</div>

<script>

const API = "http://localhost:3000";

let serverState = null;

/* =========================
   FETCH SERVER STATE
========================= */
async function loadState(){
  try{
    const res = await fetch(API + "/state");
    serverState = await res.json();

    document.getElementById("syncState").innerText =
`SYNC: ${serverState.city} / LIVE`;

  }catch(e){
    document.getElementById("syncState").innerText =
"SYNC ERROR";
  }
}

/* =========================
   SELECT CITY (SYNC ONLY)
========================= */
async function selectCity(key){

  addLog("CITY REQUEST: " + key);

  try{

    const res = await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        text:"__CITY_SYNC__",
        city:key
      })
    });

    const data = await res.json();

    addLog("SERVER CONFIRMED: " + data.city);

    await loadState();
    renderState();

  }catch(e){
    addLog("SYNC ERROR: " + e.message);
  }
}

/* =========================
   RENDER STATE (REAL DATA ONLY)
========================= */
function renderState(){

  if(!serverState) return;

  const mem = serverState.lastSync
    ? `LAST SYNC: ${serverState.lastSync}`
    : "LAST SYNC: none";

  document.getElementById("stateView").innerText =
`◆ SERVER CONTROLLED CITY

CURRENT CITY:
${serverState.city.toUpperCase()}

STATUS:
ACTIVE NODE STREAM

${mem}

----------------------
SOURCE: SERVER STATE (/state)
`;
}

/* =========================
   LOG
========================= */
function addLog(text){

  const el = document.getElementById("logBox");

  const time = new Date().toLocaleTimeString();

  el.innerText += `[${time}] ${text}\n`;

  el.scrollTop = el.scrollHeight;
}

/* =========================
   LOOP
========================= */
setInterval(async ()=>{
  await loadState();
  renderState();
}, 2000);

loadState();

</script>

</body>
</html>
