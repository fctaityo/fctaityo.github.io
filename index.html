<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // DYNAMIC NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --accent:#ff4fd8; 
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
  transition: 0.5s ease;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}
.logo span{ 
    color:var(--accent); 
    transition: 0.5s;
    text-shadow: 0 0 10px var(--accent);
}

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:20px;
  height:calc(100vh - 100px);
  padding-top:20px;
}

/* LEFT PANEL */
.leftPanel{ display:flex; flex-direction:column; gap:15px; }

.controlSection, .chatSection, .newsSection{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:rgba(255,255,255,0.02);
  display:flex;
  flex-direction:column;
  gap:10px;
  transition: 0.3s;
}

.cityBtn{
  padding:12px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  cursor:pointer;
  transition: 0.3s;
  font-size: 0.8rem;
}
.cityBtn:hover{ border-color: var(--accent); }
.cityBtn.active{
  border-color: var(--accent);
  background: rgba(255,255,255,0.05);
  box-shadow: inset 0 0 10px var(--accent);
}

.chat-label, .sectionTitle {
  font-family: 'Orbitron';
  font-size: 0.7rem;
  color: var(--accent);
  letter-spacing: 1px;
  transition: 0.5s;
}

.news-label-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#chatInput{
  background: #000;
  border: 1px solid #333;
  color: #fff;
  padding: 12px;
  font-size: 0.9rem;
  outline: none;
  border-radius: 4px;
  transition: 0.3s;
  resize: none;
}
#chatInput:focus{ border-color: var(--accent); box-shadow: 0 0 5px var(--accent); }

.sendBtn{
  background: var(--accent);
  color: #000;
  border: none;
  padding: 8px;
  font-family: 'Orbitron';
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.5s;
}

/* RIGHT PANEL */
.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  background:#111;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-top: 2px solid var(--accent);
  transition: 0.5s;
}

.statusSection { padding: 20px; border-bottom: 1px solid var(--line); }
.scrollSection { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid var(--line); }
.scrollContent { flex-grow: 1; overflow-y: scroll; padding: 0 20px 20px 20px; background: rgba(0,0,0,0.2); }
.stateBox{ white-space:pre-wrap; line-height:1.5; color:#ddd; font-size: 0.8rem; }
.memoryDisplay { font-size: 0.8rem; color: #bbb; white-space: pre-wrap; line-height: 1.6; }
.log{ font-size:0.7rem; color:#555; font-family: 'monospace'; line-height: 1.4; white-space: pre-wrap; }

#newsDisplay { font-size: 11px; color: #aaa; line-height: 1.5; }
.refresh-btn { background: transparent; border: 1px solid #444; color: #777; font-size: 8px; cursor: pointer; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

</style>
</head>
<body>

<header>
  <div class="container header-inner">
    <div class="logo" onclick="location.reload()">FCTAITYO <span id="logo-city">CITY</span></div>
  </div>
</header>

<div class="container main">

<div class="leftPanel">
  <div class="controlSection">
    <div class="chat-label">SELECT_CITY_MODE</div>
    <button class="cityBtn" id="btn-cyber" onclick="selectCity('cyber')">CYBER CITY</button>
    <button class="cityBtn" id="btn-real" onclick="selectCity('real')">REAL CITY</button>
    <button class="cityBtn" id="btn-mixed" onclick="selectCity('mixed')">MIX CITY</button>
    <div id="syncState" style="font-size:10px; color:#555; font-family:'Orbitron';">SYNC: WAITING...</div>
  </div>

  <div class="chatSection">
    <div class="chat-label">INTERVENTION_INPUT</div>
    <textarea id="chatInput" rows="4" placeholder="メッセージを入力して介入..."></textarea>
    <button class="sendBtn" id="sendBtn" onclick="sendMessage()">EXECUTE_SEND</button>
  </div>

  <div class="newsSection">
    <div class="news-label-container">
      <span class="chat-label">WORLD_NEWS_FEED</span>
      <div>
        <button class="refresh-btn" onclick="updateNews()">RELOAD</button>
        <span id="apiCounter" style="font-size: 8px; color: #555; margin-left: 8px; font-family: 'Orbitron'; vertical-align: middle;">API: --/100</span>
      </div>
    </div>
    <div id="newsDisplay">Waiting for sync...</div>
  </div>
</div>

<div class="observePanel">
  <div class="statusSection">
    <div id="stateView" class="stateBox">CITYを選択してください</div>
  </div>
  <div class="scrollSection">
    <div class="sectionTitle">RECENT_MEMORY_BUFFER</div>
    <div class="scrollContent" id="memoryScrollArea">
      <div id="memoryView" class="memoryDisplay">NO_DATA_SYNCED</div>
    </div>
  </div>
  <div class="scrollSection">
    <div class="sectionTitle">SYSTEM_LOG_STREAM</div>
    <div class="scrollContent" id="logScrollArea">
      <div class="log" id="logBox"></div>
    </div>
  </div>
</div>

</div>

<script>
// --- CONFIGURATION ---
const API = "http://localhost:3000";
let currentCity = "real";

const cityColors = {
  cyber: "#00e5ff",
  real: "#7CFF6B",
  mixed: "#ff4fd8"
};

// --- INITIALIZE ---
window.addEventListener('DOMContentLoaded', () => {
  selectCity('real');
  updateNews();
  
  document.getElementById("chatInput").addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// --- FUNCTIONS ---
async function selectCity(key){
  currentCity = key;
  
  const accentColor = cityColors[key];
  document.documentElement.style.setProperty('--accent', accentColor);
  document.getElementById('logo-city').innerText = key.toUpperCase() + " CITY";

  // UI状態の更新
  document.querySelectorAll('.cityBtn').forEach(btn => btn.classList.remove('active'));
  const targetBtn = document.getElementById('btn-' + key);
  if(targetBtn) targetBtn.classList.add('active');

  document.getElementById('syncState').innerText = "SYNC: ACTIVE";
  document.getElementById('stateView').innerText = `${key.toUpperCase()} モードへ切り替え完了。観測を開始します。`;
  
  addLog("MODE_SWITCH: " + key);
}

function addLog(msg) {
  const logBox = document.getElementById('logBox');
  const now = new Date().toLocaleTimeString();
  logBox.innerText += `[${now}] ${msg}\n`;
  const area = document.getElementById('logScrollArea');
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;

  addLog("SEND_REQUEST: " + msg.substring(0, 20) + "...");
  input.value = "";

  // ダミーの応答処理（API接続がない場合を想定）
  setTimeout(() => {
    document.getElementById('memoryView').innerText = `LAST_INTERVENTION: ${msg}\nSTATUS: PROCESSED IN ${currentCity}`;
    addLog("SERVER_ACK: SUCCESS");
  }, 500);
}

async function updateNews() {
  document.getElementById('newsDisplay').innerText = "Fetching latest global data...";
  setTimeout(() => {
    document.getElementById('newsDisplay').innerText = "No major anomalies detected in the current timeline.";
    document.getElementById('apiCounter').innerText = "API: 24/100";
    addLog("NEWS_REFRESH: COMPLETED");
  }, 800);
}
</script>
</body>
</html>
