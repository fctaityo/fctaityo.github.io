<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FCTAITYO CITY // OBSERVATION NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0a;
  --line:rgba(255,255,255,0.08);
  --text:#f5f5f5;
  --cyber:#00e5ff;
  --real:#7CFF6B;
  --mix:#ff4fd8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:4px;
  font-size:2rem;
  cursor:pointer;
}

.logo span{ color:var(--mix); }

nav a{
  font-family:'Orbitron';
  color:var(--text);
  text-decoration:none;
  font-size:14px;
  padding:8px 12px;
  border:1px solid #333;
}

.container{
  width:92%;
  max-width:1400px;
  margin:auto;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  height:calc(100vh - 80px);
  padding-top:20px;
}

.selectPanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  background:rgba(255,255,255,0.02);
}

.cityBtn{
  padding:18px;
  border:1px solid #333;
  background:#151515;
  color:var(--text);
  font-family:'Orbitron';
  cursor:pointer;
  transition: 0.3s;
}

.cityBtn:hover{
  background: #222;
  border-color: var(--mix);
}

.observePanel{
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  background:#111;
  overflow:auto;
}

.title{
  font-family:'Orbitron';
  margin-bottom:15px;
}

.stateBox{
  white-space:pre-wrap;
  line-height:1.8;
  border-top:1px solid var(--line);
  padding-top:15px;
  color:#ddd;
}

.sync{
  margin-top:10px;
  font-size:12px;
  color:#777;
}

/* --- New News Section --- */
.news-container {
  margin-top: auto;
  padding-top: 15px;
  border-top: 1px dashed #333;
}

.news-label {
  font-family: 'Orbitron';
  font-size: 10px;
  color: var(--mix);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

#newsDisplay {
  font-size: 11px;
  color: #aaa;
  line-height: 1.5;
  min-height: 3em;
}

.refresh-btn {
  margin-top: 10px;
  background: transparent;
  border: 1px solid #444;
  color: #777;
  font-size: 10px;
  font-family: 'Orbitron';
  padding: 4px 8px;
  cursor: pointer;
}

.refresh-btn:hover {
  color: var(--text);
  border-color: var(--text);
}

.log{
  margin-top:20px;
  font-size:0.8rem;
  color:#888;
  border-top:1px solid var(--line);
  padding-top:10px;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo" onclick="location.reload()">
      FCTAITYO <span>CITY</span>
    </div>

    <nav>
      <a href="city.html">NODE SYSTEM</a>
    </nav>
  </div>
</header>

<div class="container main">

<div class="selectPanel">

  <button class="cityBtn" onclick="selectCity('cyber')">CYBER CITY</button>
  <button class="cityBtn" onclick="selectCity('real')">REAL CITY</button>
  <button class="cityBtn" onclick="selectCity('mixed')">MIX CITY</button>

  <div class="sync" id="syncState">SYNC: waiting...</div>

  <div class="news-container">
    <div class="news-label">
      <span>WORLD_NEWS_FEED</span>
      <button class="refresh-btn" onclick="updateNews()">RELOAD</button>
    </div>
    <div id="newsDisplay">Initializing stream...</div>
  </div>

</div>

<div class="observePanel">

  <div class="title">CITY OBSERVER</div>

  <div id="stateView" class="stateBox">CITYを選択してください</div>

  <div class="log" id="logBox"></div>

</div>

</div>

<script>

const API = "http://localhost:3000";
let refreshing = false;

/* =========================
   CITY SELECT
========================= */
async function selectCity(key){
  addLog("CITY REQUEST: " + key);
  try{
    await fetch(API + "/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        text:"__CITY_SYNC__",
        city:key
      })
    });
    await refreshState();
    addLog("SERVER CONFIRMED: " + key);
  }catch(e){
    addLog("SYNC ERROR: " + e.message);
  }
}

/* =========================
   NEWS UPDATE
========================= */
async function updateNews(){
  const newsEl = document.getElementById("newsDisplay");
  newsEl.innerText = "FETCHING LATEST LOGS...";
  try {
    const res = await fetch(API + "/api/news");
    const data = await res.json();
    newsEl.innerText = data.news;
    addLog("NEWS FEED UPDATED");
  } catch(e) {
    newsEl.innerText = "NEWS_OFFLINE";
    addLog("NEWS ERROR: " + e.message);
  }
}

/* =========================
   STATE FETCH
========================= */
async function refreshState(){
  if (refreshing) return;
  refreshing = true;
  try{
    const res = await fetch(API + "/state");
    const data = await res.json();
    renderState(data);
    document.getElementById("syncState").innerText =
      `SYNC: ${data.city} / MEM:${data.memorySize ?? "?"}`;
  }catch(e){
    addLog("STATE ERROR: " + e.message);
  } finally {
    refreshing = false;
  }
}

/* =========================
   RENDER
========================= */
function renderState(data){
  const el = document.getElementById("stateView");
  el.innerText =
`◆ SERVER CONTROLLED CITY

CURRENT CITY:
${data.city}

STATUS:
ACTIVE NODE STREAM

LAST SYNC:
${data.lastSync || "N/A"}

MEMORY SIZE:
${data.memorySize ?? "unknown"}

RECENT MEMORY:
${data.recentMemory || "NO DATA"}

PROFILE:
${data.profile?.state || ""}

BEHAVIOR:
${data.profile?.behavior || ""}

SOURCE: /state`;
}

function addLog(text){
  const el = document.getElementById("logBox");
  const time = new Date().toLocaleTimeString();
  el.innerText += `[${time}] ${text}\n`;
}

// LOOP
setInterval(refreshState, 3000);

// INITIALIZE
refreshState();
updateNews(); // 初回ニュース取得

</script>

</body>
</html>
